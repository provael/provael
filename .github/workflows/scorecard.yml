# OpenSSF Scorecard — supply-chain hygiene for the repo (a security tool should score well itself).
# Publishes results to the Security tab (code scanning) and the OpenSSF dashboard.
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "37 6 * * 1"   # weekly, Monday 06:37 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: ossf-scorecard
