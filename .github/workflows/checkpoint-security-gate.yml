# Continuous per-checkpoint security gate (reference workflow).
#
# Treats each new run as a candidate checkpoint: restore the last known-good baseline (persisted in
# the Actions cache), red-team + diff against it, fail on a regression (delta beyond tolerance AND
# 95% Wilson CIs disjoint), and — only when the gate passes — promote this run to the new baseline.
# It is self-maintaining: the first run just establishes the baseline; every run after diffs against
# it. Generic across the policy/suite abstraction (stub × stub on CPU here; point `policy`/`suite` at
# a real checkpoint on a GPU runner — generality intended, tested on SmolVLA × LIBERO).
#
# This copy self-tests the checked-out source (`install-spec: .[attest]`); a design partner copies
# the job and swaps `uses: ./` for `uses: provael/provael@v0.23.0` (installs the pinned release).
name: Checkpoint security gate

on:
  workflow_dispatch:
    inputs:
      policy:
        description: "Registered policy (stub on CPU; smolvla needs a GPU runner)."
        default: "stub"
      suite:
        description: "Registered suite (stub on CPU; libero needs the [lerobot] extra)."
        default: "stub"
      attacks:
        description: "Comma-separated attack/family names."
        default: "instruction,visual,injection"
  push:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"   # weekly, Monday 06:23 UTC (off the :00 mark)

permissions:
  contents: read
  security-events: write   # upload SARIF to code scanning

concurrency:
  group: checkpoint-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLICY: ${{ github.event.inputs.policy || 'stub' }}
      SUITE: ${{ github.event.inputs.suite || 'stub' }}
      ATTACKS: ${{ github.event.inputs.attacks || 'instruction,visual,injection' }}
      BASELINE_FILE: .provael/baseline.report.json
    steps:
      - uses: actions/checkout@v7

      - name: Restore the stored baseline
        uses: actions/cache/restore@v4
        with:
          path: .provael/baseline.report.json
          # A run-id-unique key writes a fresh entry each run; the restore-key prefix finds the most
          # recent stored baseline for this policy/suite.
          key: provael-baseline-${{ env.POLICY }}-${{ env.SUITE }}-${{ github.run_id }}
          restore-keys: |
            provael-baseline-${{ env.POLICY }}-${{ env.SUITE }}-

      - name: Resolve the baseline path
        id: baseline
        shell: bash
        run: |
          if [ -f "$BASELINE_FILE" ]; then
            echo "path=$BASELINE_FILE" >> "$GITHUB_OUTPUT"
            echo "Diffing this checkpoint against the stored baseline."
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "First run — no baseline yet; this run establishes it."
          fi

      - name: Red-team + regression gate
        id: gate
        uses: ./
        with:
          policy: ${{ env.POLICY }}
          suite: ${{ env.SUITE }}
          attacks: ${{ env.ATTACKS }}
          episodes: "10"
          # Demo ceiling: high so the *regression* gate (not the absolute one) is what's exercised on
          # the deterministic stub. Lower it for a real checkpoint.
          asr-threshold: "0.9"
          baseline: ${{ steps.baseline.outputs.path }}
          regression-tolerance: "0.05"
          fail-on-regression: "true"
          sign: "true"
          # Optional org key (repo secret). Empty -> an ephemeral key (integrity, not identity).
          signing-key: ${{ secrets.PROVAEL_SIGNING_KEY }}
          # Self-test the checked-out source; a consumer omits this to install the pinned release.
          install-spec: ".[attest]"

      - name: Promote this run to the new baseline
        # success() => the gate passed (no regression, under threshold). A regressed checkpoint must
        # never become the baseline, so this is skipped on failure.
        if: success()
        shell: bash
        run: |
          mkdir -p .provael
          cp provael-run/report.json "$BASELINE_FILE"

      - name: Save the new baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .provael/baseline.report.json
          key: provael-baseline-${{ env.POLICY }}-${{ env.SUITE }}-${{ github.run_id }}
