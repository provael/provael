name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only needs to read the repo. A PR from a fork therefore cannot use
# it to obtain a write token or secrets.
permissions:
  contents: read

# Don't pile up runs on a busy branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CPU-only by design: this workflow NEVER installs the optional `[lerobot]` extra,
# so it pulls no torch / transformers / GPU stack. The LeRobot integration tests are
# gated (PROVAEL_INTEGRATION) and skip here automatically.
#
# Coverage note — the prompt's required checks map to jobs here:
#   lint / typing / unit ............ `check` (ruff / mypy / pytest)
#   schema-migration + golden ....... pytest (test_assurance drift guard, test_manifest drift guard)
#   evidence-integrity + property ... pytest (test_attest, test_adversarial_asr, test_evidence_state,
#                                     test_verdict, test_action_schema)
#   public-manifest gen + diff ...... pytest (test_manifest checked-in drift guard)
#   package build + metadata ........ `build` (uv build + twine check)
#   docs strict ..................... .github/workflows/docs.yml
#   optional integration ............ gated (PROVAEL_INTEGRATION); skips here, must-fail in release
jobs:
  check:
    name: ruff + mypy + pytest (CPU, no lerobot)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv (pinned Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync core + dev (no extras)
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy, strict)
        run: uv run mypy src

      - name: Test (pytest, CPU only)
        run: uv run pytest -q

  build:
    name: package build + metadata check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv (pinned Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

  audit:
    name: dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv (pinned Python 3.12)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # Audit the locked dependency set for known CVEs. Documented exception mechanism: add an
      # `--ignore-vuln <ID>` with a dated justification in a review comment when a fix is unavailable.
      - name: Audit dependencies (pip-audit)
        run: |
          uv sync --locked
          uvx pip-audit --strict --progress-spinner off
