# Recipe: regression-gate — the run a checkpoint-regression CI gate executes.
# Same coverage as ci-gate; paired with examples/ci/regression-gate.md. Run it on the candidate,
# then diff against the last known-good baseline (fails on a statistically meaningful regression):
#   provael attack --recipe regression-gate --out runs/candidate
#   provael report --in runs/candidate --baseline .provael/baseline.report.json \
#     --regression-tolerance 0.05 --sarif-out runs/candidate/regression.sarif
attacks: [instruction, visual, injection, action]
episodes: 10
seed: 0
